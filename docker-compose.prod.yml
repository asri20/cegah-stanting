version: '3.8'

services:
  app:
    # Ganti dengan URI ECR kamu yang sudah kamu catat
    image: ${ECR_URI}:latest
    restart: always
    ports:
      - "80:8000"
    environment:
      # Variabel ini akan diisi otomatis oleh GitHub Secrets
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - S3_BUCKET=${S3_BUCKET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      - nginx

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro